*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --f: #1e2d12;
    --g: #6b8f3a;
    --gl: #a8c46a;
    --lc: #eef4de;
    --am: #b87333;
    --pp: #f4efe6;
    --mu: #5a6b4a;
    --dk: #111a09;
    --wh: #ffffff;
    --bd: rgba(107, 143, 58, 0.15);
    --red: #c0392b;
    --gold: #d4a017;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--pp);
    color: var(--f);
    overflow-x: hidden;
    font-size: 15px;
    line-height: 1.6;
}

@media (prefers-reduced-motion: reduce) {
    * {
        transition: none !important;
    }
}
