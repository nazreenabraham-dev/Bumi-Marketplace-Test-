<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Friendly Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }

        main {
            padding: 1rem;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .content-section {
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            header {
                font-size: 1.2rem;
            }

            .content-section {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        Welcome to Bumi Marketplace
    </header>
    <main>
        <div class="content-section">
            <img src="example-image.jpg" alt="Sample marketplace image">
            <p>Find the best products at the best prices!</p>
        </div>
    </main>
</body>
</html>
