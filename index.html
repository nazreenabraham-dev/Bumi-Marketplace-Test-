<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --f:#1e2d12;--g:#6b8f3a;--gl:#a8c46a;--lc:#eef4de;
  --am:#b87333;--pp:#f4efe6;--mu:#5a6b4a;--dk:#111a09;
  --wh:#ffffff;--bd:rgba(107,143,58,0.15);--red:#c0392b;
  --gold:#d4a017;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--pp);color:var(--f);overflow-x:hidden;font-size:15px;line-height:1.6}

/* ACCESSIBILITY: larger base, higher contrast */
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ── LANG BAR ── */
#lang-bar{position:fixed;top:0;left:0;right:0;z-index:300;background:var(--dk);display:flex;justify-content:flex-end;align-items:center;padding:5px 1.5rem;gap:6px;border-bottom:0.5px solid rgba(107,143,58,.15);flex-wrap:wrap;min-height:34px}
.lb{font-size:13px;letter-spacing:.06em;padding:4px 14px;border-radius:20px;cursor:pointer;border:1px solid rgba(168,196,106,.25);background:transparent;color:rgba(238,244,222,.45);font-family:'DM Sans',sans-serif;transition:.15s}
.lb.on{background:var(--g);color:var(--lc);border-color:var(--g);font-weight:500}

/* ── NAV ── */
#nav{position:fixed;top:34px;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:.7rem 1.5rem;background:rgba(17,26,9,.96);backdrop-filter:blur(16px);border-bottom:0.5px solid rgba(107,143,58,.1)}
.nav-brand{font-family:'DM Serif Display',serif;font-size:22px;color:var(--lc);cursor:pointer}
.nav-links{display:flex;gap:0;list-style:none}
.nav-links li a{font-size:13px;color:rgba(238,244,222,.45);text-decoration:none;padding:.4rem .9rem;border-radius:20px;transition:.15s;cursor:pointer;display:block;min-height:44px;display:flex;align-items:center}
.nav-links li a:hover,.nav-links li a.active{color:var(--lc)}
.nav-links li a.active{color:var(--gl);background:rgba(107,143,58,.12)}
.nav-r{display:flex;gap:.5rem;align-items:center}
.nav-cta{font-size:13px;background:var(--g);color:var(--lc);padding:.45rem 1.1rem;border-radius:20px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:500;min-height:44px}
.nav-login{font-size:13px;color:rgba(238,244,222,.45);padding:.45rem .8rem;cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;min-height:44px}

/* ── MOBILE NAV TOGGLE ── */
.nav-toggle{display:none;background:none;border:none;color:var(--lc);font-size:24px;cursor:pointer;z-index:250;min-height:44px;min-width:44px}
@media (max-width:768px){
  .nav-toggle{display:block}
  #nav{flex-wrap:wrap;padding:.5rem 1.5rem;gap:.5rem}
  .nav-brand{font-size:18px}
  .nav-links{display:none;flex-direction:column;position:absolute;top:80px;left:0;right:0;background:rgba(17,26,9,.98);width:100%;padding:1rem 0;gap:0;border-bottom:1px solid rgba(107,143,58,.1)}
  .nav-links.show{display:flex}
  .nav-links li a{padding:.75rem 1.5rem;border-radius:0;font-size:14px}
  .nav-r{position:static;flex-direction:row;gap:.25rem;transform:none}
  .nav-cta{padding:.4rem .8rem;font-size:12px}
  .nav-login{padding:.4rem .6rem;font-size:12px}
}

/* ── PAGES ── */
.page{display:none;padding-top:86px;min-height:100vh}
.page.active{display:block}

/* ── BUTTONS — big & accessible ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:.7rem 1.5rem;border-radius:28px;font-size:14px;font-weight:500;letter-spacing:.02em;cursor:pointer;border:none;text-decoration:none;font-family:'DM Sans',sans-serif;transition:.15s;min-height:44px}
.btn-green{background:var(--g);color:var(--lc)}
.btn-green:hover{background:#5a7a2e}
.btn-outline{background:transparent;color:var(--g);border:1.5px solid var(--g)}
.btn-dark{background:var(--f);color:var(--lc)}
.btn-white{background:var(--wh);color:var(--f)}
.btn-amber{background:var(--am);color:var(--wh)}
.btn-gold{background:var(--gold);color:var(--dk)}
.btn-sm{padding:.45rem 1rem;font-size:12.5px;min-height:36px}
.btn-lg{padding:.9rem 2.25rem;font-size:15px;min-height:52px}
.btn-xl{padding:1.1rem 2.5rem;font-size:16px;min-height:56px;border-radius:32px}

/* ── TYPOGRAPHY ── */
.serif{font-family:'DM Serif Display',serif}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--g);margin-bottom:.6rem}
.eyebrow-lt{color:var(--gl)}
.section{padding:4rem 1.5rem}
.sec-alt{background:var(--lc)}
.sec-dark{background:var(--f)}
.sec-deep{background:var(--dk)}
.sec-white{background:var(--wh)}
.container{max-width:1100px;margin:0 auto;padding:0 1rem}
h1.serif{font-size:clamp(36px,6vw,66px);line-height:1.0}
h2.serif{font-size:clamp(24px,3.5vw,38px);line-height:1.1;margin-bottom:1rem}
h3.serif{font-size:22px;line-height:1.2;margin-bottom:.5rem}
.lead{font-size:15px;color:var(--mu);line-height:1.85;font-weight:300}
.muted{color:var(--mu)}
.large-text{font-size:17px;line-height:1.8}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.g2-asym{display:grid;grid-template-columns:1.1fr .9fr;gap:3rem;align-items:center}

@media (max-width:768px){
  .g2,.g2-asym{grid-template-columns:1fr;gap:1.5rem}
  .g3{grid-template-columns:repeat(2,1fr);gap:1rem}
  .g4{grid-template-columns:repeat(2,1fr);gap:.75rem}
  .section{padding:2.5rem 1rem}
}

@media (max-width:480px){
  .g3,.g4{grid-template-columns:1fr}
  .section{padding:2rem .75rem}
  h1.serif{font-size:clamp(28px,5vw,40px)}
  h2.serif{font-size:clamp(18px,4vw,28px)}
  .container{padding:0 .75rem}
}

/* ── CARDS ── */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.card-pad{padding:1.25rem}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:16px;font-size:11.5px;font-weight:500;letter-spacing:.04em}
.tag-green{background:rgba(107,143,58,.1);color:var(--g)}
.tag-amber{background:rgba(184,115,51,.1);color:var(--am)}
.tag-halal{background:rgba(184,115,51,.12);color:var(--am);border:1px solid rgba(184,115,51,.2)}
.tag-organic{background:rgba(107,143,58,.1);color:var(--g);border:1px solid rgba(107,143,58,.2)}
.tag-promo{background:var(--gold);color:var(--dk);font-weight:600}
.tag-free{background:rgba(107,143,58,.15);color:var(--g);font-weight:600}

/* ── HERO ── */
.hero{min-height:calc(100vh - 86px);background:var(--dk);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:4rem 1.5rem 3rem}
.hero-photo-bg{position:absolute;inset:0;background:url('/mnt/user-data/uploads/21__A_new_bloom__2011_.jpg') center/cover no-repeat;opacity:.32;filter:saturate(.7) sepia(.2)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(17,26,9,.97) 0%,rgba(17,26,9,.5) 55%,rgba(17,26,9,.15) 100%)}
.hero-content{position:relative;z-index:2;max-width:640px}
.hero-eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gl);margin-bottom:1.25rem}
.eyebrow-line{width:28px;height:.5px;background:var(--gl)}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(40px,7vw,74px);line-height:1.0;color:var(--lc);margin-bottom:1rem;width:100%}
.hero-title em{font-style:italic;color:var(--gl)}
.hero-sub{font-size:16px;color:rgba(238,244,222,.55);max-width:460px;line-height:1.85;margin-bottom:2rem;font-weight:300}
.hero-actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
.hero-tags{display:flex;gap:.5rem;flex-wrap:wrap}
.hero-tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(168,196,106,.4);border:0.5px solid rgba(168,196,106,.12);padding:4px 12px;border-radius:16px}

@media (max-width:768px){
  .hero{padding:3rem 1rem 2rem;min-height:auto}
  .hero-actions{flex-direction:column}
  .hero-actions .btn{width:100%;justify-content:center}
}

/* ── STAT BAR ── */
.stat-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--dk);border-top:.5px solid rgba(107,143,58,.15)}
.sc{padding:1.25rem 1.5rem;border-right:.5px solid rgba(107,143,58,.08)}
.sc:last-child{border:none}
.sc-n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--lc);margin-bottom:3px}
.sc-l{font-size:12px;color:rgba(168,196,106,.4);line-height:1.5}

@media (max-width:768px){
  .stat-bar{grid-template-columns:repeat(2,1fr)}
  .sc{padding:1rem;border-right:.5px solid rgba(107,143,58,.08);border-bottom:.5px solid rgba(107,143,58,.08)}
  .sc:nth-child(2n){border-right:none}
  .sc:nth-child(n+3){border-bottom:none}
  .sc-n{font-size:22px}
  .sc-l{font-size:11px}
}

@media (max-width:480px){
  .stat-bar{grid-template-columns:1fr}
  .sc{border-right:none;border-bottom:.5px solid rgba(107,143,58,.08);padding:.75rem}
  .sc:last-child{border-bottom:none}
}

/* ── PHOTO STRIP ── */
.strip{display:grid;grid-template-columns:1.2fr .8fr 1fr;height:240px;overflow:hidden}
.strip-cell{position:relative;overflow:hidden;background:var(--f)}
.strip-cell img{width:100%;height:100%;object-fit:cover;opacity:.6;filter:saturate(.75) sepia(.15);display:block}
.strip-lbl{position:absolute;bottom:0;left:0;right:0;padding:.875rem;background:linear-gradient(to top,rgba(17,26,9,.85),transparent);font-size:13px;color:var(--lc);letter-spacing:.04em}

@media (max-width:768px){
  .strip{height:160px}
  .strip-lbl{font-size:11px;padding:.625rem}
}

@media (max-width:480px){
  .strip{grid-template-columns:1fr;height:120px}
}

/* ── MARKETPLACE ── */
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;padding:.875rem 1.5rem;background:var(--wh);border-bottom:1px solid var(--bd);position:sticky;top:86px;z-index:50;overflow-x:auto}
.filter-btn{font-size:12.5px;padding:6px 16px;border-radius:20px;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;transition:.15s;white-space:nowrap;min-height:36px}
.filter-btn:hover,.filter-btn.on{background:var(--f);color:var(--lc);border-color:var(--f)}
.search-bar{display:flex;gap:.5rem;padding:.875rem 1.5rem;background:var(--wh);border-bottom:1px solid var(--bd);align-items:center}
.search-input{flex:1;padding:.6rem 1rem;border:1px solid var(--bd);border-radius:28px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--pp);min-height:44px}
.search-input:focus{border-color:var(--g)}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding:1.25rem 1.5rem}
.product-card{background:var(--wh);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:.15s;cursor:pointer}
.product-card:hover{box-shadow:0 4px 24px rgba(30,45,18,.1);transform:translateY(-2px)}
.product-img{height:160px;background:var(--f);position:relative;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover;opacity:.85;filter:saturate(.8) sepia(.1)}
.product-body{padding:1rem}
.product-name{font-size:14px;font-weight:500;margin-bottom:3px;color:var(--f)}
.product-farm{font-size:12px;color:var(--mu);margin-bottom:.5rem}
.product-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.product-price{font-family:'DM Serif Display',serif;font-size:20px;color:var(--f)}
.product-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.5rem}

@media (max-width:768px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:.75rem;padding:1rem}
  .product-img{height:120px}
  .filter-bar,.search-bar{padding:.75rem 1rem}
}

@media (max-width:480px){
  .product-grid{grid-template-columns:1fr;gap:.5rem;padding:.75rem}
  .search-bar{flex-direction:column}
  .search-input{width:100%}
}

/* ── HIRE ── */
.service-card{background:var(--wh);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;transition:.15s;cursor:pointer}
.service-card:hover{box-shadow:0 4px 24px rgba(30,45,18,.1);transform:translateY(-2px)}
.service-header{display:flex;gap:.875rem;align-items:flex-start;margin-bottom:.875rem}
.service-avatar{width:48px;height:48px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:var(--lc);flex-shrink:0}
.service-name{font-size:14px;font-weight:500;margin-bottom:2px;color:var(--f)}
.service-role{font-size:12px;color:var(--mu)}
.service-body{font-size:13px;color:var(--mu);line-height:1.7;margin-bottom:.875rem}
.service-footer{display:flex;justify-content:space-between;align-items:center;padding-top:.875rem;border-top:1px solid var(--bd);flex-wrap:wrap;gap:.5rem}
.service-rate{font-family:'DM Serif Display',serif;font-size:20px;color:var(--f)}
.service-rate span{font-size:12px;font-weight:300;font-family:'DM Sans',sans-serif;color:var(--mu)}
.stars{display:flex;gap:2px;color:var(--am);font-size:13px}

@media (max-width:480px){
  .service-footer{flex-direction:column;align-items:flex-start}
  .service-footer .btn{width:100%;justify-content:center}
}

/* ── COMMUNITY ── */
.feed-post{background:var(--wh);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;margin-bottom:1rem}
.post-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem}
.post-avatar{width:42px;height:42px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:var(--lc);flex-shrink:0}
.post-meta{flex:1}
.post-name{font-size:14px;font-weight:500;color:var(--f)}
.post-sub{font-size:12px;color:var(--mu)}
.post-body{font-size:13.5px;color:var(--f);line-height:1.75;margin-bottom:.875rem}
.post-img{height:200px;border-radius:12px;overflow:hidden;margin-bottom:.875rem}
.post-img img{width:100%;height:100%;object-fit:cover;opacity:.85;filter:saturate(.8)}
.post-actions{display:flex;gap:1.25rem;padding-top:.875rem;border-top:1px solid var(--bd);flex-wrap:wrap}
.post-action{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--mu);cursor:pointer;transition:.15s;min-height:36px}
.post-action:hover{color:var(--g)}

@media (max-width:768px){
  #page-community > div{display:grid!important;grid-template-columns:1fr!important;gap:1rem!important}
  .post-img{height:150px}
}

@media (max-width:480px){
  .post-img{height:120px}
  .post-actions{gap:.75rem}
}

/* ── DASHBOARD ── */
.dash-layout{display:grid;grid-template-columns:220px 1fr;gap:0;min-height:calc(100vh - 86px)}
.dash-sidebar{background:var(--f);padding:1.5rem 0;border-right:1px solid rgba(107,143,58,.15);position:sticky;top:86px;height:calc(100vh - 86px);overflow-y:auto}
.dash-nav-item{display:flex;align-items:center;gap:10px;padding:.75rem 1.5rem;font-size:13.5px;color:rgba(238,244,222,.5);cursor:pointer;transition:.15s;border-left:3px solid transparent;min-height:44px}
.dash-nav-item:hover{color:var(--lc);background:rgba(107,143,58,.08)}
.dash-nav-item.active{color:var(--gl);border-left-color:var(--g);background:rgba(107,143,58,.1)}
.dash-nav-item i{font-size:18px}
.dash-main{padding:1.5rem;background:var(--pp);overflow-y:auto}
.dash-section{display:none}
.dash-section.active{display:block}
.dash-header{margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.dash-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:4px}
.dash-sub{font-size:13px;color:var(--mu)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.kpi{background:var(--wh);border:1px solid var(--bd);border-radius:14px;padding:1.25rem}
.kpi-n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--f);margin-bottom:4px}
.kpi-l{font-size:12px;color:var(--mu)}
.kpi-delta{font-size:11px;margin-top:4px}
.kpi-delta.up{color:var(--g)}
.kpi-delta.dn{color:var(--red)}
.table-wrap{background:var(--wh);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:1.5rem;overflow-x:auto}
.table-head{padding:.875rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.table-title{font-size:14px;font-weight:500}
table{width:100%;border-collapse:collapse;min-width:100%}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);padding:.75rem 1.25rem;text-align:left;border-bottom:1px solid var(--bd);background:var(--pp)}
td{font-size:13px;padding:.875rem 1.25rem;border-bottom:1px solid rgba(107,143,58,.06);color:var(--f)}
tr:last-child td{border:none}
tr:hover td{background:rgba(107,143,58,.03)}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;min-height:28px}
.status-paid{background:rgba(107,143,58,.1);color:var(--g)}
.status-pending{background:rgba(184,115,51,.1);color:var(--am)}
.status-low{background:rgba(192,57,43,.1);color:var(--red)}
.chart-bar-row{display:flex;align-items:flex-end;gap:6px;height:100px;padding:.5rem 0;overflow-x:auto}
.chart-bar{flex:1;background:var(--g);border-radius:4px 4px 0 0;opacity:.7;transition:.3s;min-width:20px}
.chart-bar:hover{opacity:1}
.chart-labels{display:flex;gap:6px;margin-top:4px;overflow-x:auto}
.chart-label{flex:1;text-align:center;font-size:10px;color:var(--mu);min-width:20px}
.form-group{margin-bottom:1rem}
.form-label{font-size:13px;font-weight:500;margin-bottom:5px;display:block;color:var(--f)}
.form-input{width:100%;padding:.65rem 1rem;border:1px solid var(--bd);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--pp);min-height:44px}
.form-input:focus{border-color:var(--g)}
.form-select{width:100%;padding:.65rem 1rem;border:1px solid var(--bd);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--pp);min-height:44px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}

@media (max-width:1024px){
  .dash-layout{grid-template-columns:140px 1fr}
  .dash-sidebar{width:140px;padding:1rem 0}
  .dash-nav-item{padding:.6rem 1rem;font-size:12px;gap:6px}
  .dash-nav-item i{font-size:16px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}

@media (max-width:768px){
  .dash-layout{grid-template-columns:1fr}
  .dash-sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid rgba(107,143,58,.15);padding:0;display:flex;overflow-x:auto;gap:0}
  .dash-nav-item{padding:.75rem 1rem;border-left:none;border-bottom:3px solid transparent;flex:0 0 auto;white-space:nowrap}
  .dash-nav-item.active{border-bottom-color:var(--g);border-left-color:transparent;background:transparent}
  .dash-main{padding:1rem}
  .kpi-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .dash-title{font-size:20px}
  .dash-header{flex-direction:column;align-items:stretch}
  .dash-header .btn{width:100%;justify-content:center}
}

/* ── INVOICE ── */
.invoice-card{background:var(--wh);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:1rem;overflow-x:auto}
.invoice-head{background:var(--f);padding:1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.inv-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--lc)}
.inv-num{font-size:12px;color:rgba(238,244,222,.4);margin-top:2px}
.invoice-body{padding:1.25rem;overflow-x:auto}
.inv-row{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--bd);font-size:13px;gap:1rem}
.inv-row:last-child{border:none;font-weight:500;font-size:14px}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1.25rem}
.inv-field{background:var(--pp);border-radius:10px;padding:.75rem 1rem}
.inv-field-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:3px}
.inv-field-val{font-size:13px;font-weight:500;color:var(--f)}

@media (max-width:480px){
  .invoice-head{flex-direction:column;align-items:flex-start;gap:.5rem}
  .inv-meta{grid-template-columns:1fr}
}

/* ── VERIFICATION PAGE ── */
.verify-tier{background:var(--wh);border:1px solid var(--bd);border-radius:16px;padding:1.75rem;position:relative;overflow:hidden}
.verify-tier.featured{border:2px solid var(--g);background:var(--f);color:var(--lc)}
.verify-tier.featured-am{border:2px solid var(--am)}
.promo-ribbon{position:absolute;top:16px;right:-28px;background:var(--gold);color:var(--dk);font-size:10px;font-weight:700;padding:4px 36px;transform:rotate(45deg);letter-spacing:.08em}
.vt-badge{display:inline-block;font-size:10px;padding:4px 12px;border-radius:16px;margin-bottom:.875rem;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.vt-badge-free{background:rgba(107,143,58,.12);color:var(--g)}
.vt-badge-org{background:var(--g);color:var(--lc)}
.vt-badge-hlal{background:var(--am);color:var(--wh)}
.vt-name{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px}
.vt-price-wrap{margin-bottom:2px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.vt-price{font-family:'DM Serif Display',serif;font-size:36px;color:var(--f)}
.vt-price-f{color:var(--lc)}
.vt-price-strike{font-family:'DM Serif Display',serif;font-size:20px;color:var(--mu);text-decoration:line-through}
.vt-period{font-size:12px;color:var(--mu);margin-bottom:1.25rem}
.vt-period-f{color:rgba(238,244,222,.45)}
.vt-li{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:6px 0;border-bottom:.5px solid rgba(107,143,58,.1);color:var(--f)}
.vt-li-f{color:rgba(238,244,222,.65);border-bottom:.5px solid rgba(255,255,255,.06)}
.vt-li:last-child,.vt-li-f:last-child{border:none}
.vt-li i{color:var(--g);font-size:15px;flex-shrink:0;margin-top:1px}
.vt-cta{display:block;text-align:center;margin-top:1.25rem;padding:.75rem;border-radius:28px;font-size:13.5px;font-weight:500;cursor:pointer;letter-spacing:.04em;border:1.5px solid var(--g);color:var(--g);background:transparent;width:100%;transition:.15s;min-height:44px}
.vt-cta-fill{background:var(--g);color:var(--lc);border-color:var(--g)}
.vt-cta-am{background:var(--am);color:var(--wh);border-color:var(--am)}
.vt-cta-gold{background:var(--gold);color:var(--dk);border-color:var(--gold);font-weight:700}

/* ── PERMACULTURE CARDS ── */
.pc{padding:1.25rem;border-top:3px solid var(--g)}
.pc-n{font-family:'DM Serif Display',serif;font-size:30px;color:rgba(168,196,106,.18);margin-bottom:.4rem}
.pc-t{font-size:13px;font-weight:500;color:var(--lc);margin-bottom:.4rem}
.pc-b{font-size:12px;color:rgba(238,244,222,.4);line-height:1.65}

/* ── STEPS ── */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative}
.steps::before{content:'';position:absolute;top:24px;left:12%;right:12%;height:.5px;background:rgba(107,143,58,.2)}
.step{padding:.875rem;text-align:center}
.step-n{width:48px;height:48px;border-radius:50%;background:rgba(107,143,58,.08);border:.5px solid rgba(107,143,58,.2);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:var(--gl);margin:0 auto}
.step-t{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--lc)}
.step-d{font-size:12px;color:rgba(238,244,222,.4);line-height:1.6}

@media (max-width:768px){
  .steps{grid-template-columns:repeat(2,1fr)}
  .steps::before{top:22px;left:5%;right:5%}
}

@media (max-width:480px){
  .steps{grid-template-columns:1fr}
  .steps::before{display:none}
  .step{padding:.75rem}
}

/* ── TESTI ── */
.testi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.testi{padding:1.25rem;border-radius:16px;border:.5px solid rgba(107,143,58,.12);background:rgba(255,255,255,.02)}
.testi-q{font-family:'DM Serif Display',serif;font-size:15px;color:var(--lc);line-height:1.6;font-style:italic;margin-bottom:.875rem}
.testi-who{font-size:12px;color:rgba(168,196,106,.45)}
.testi-name{font-weight:500;color:rgba(238,244,222,.6);font-style:normal}

@media (max-width:768px){
  .testi-grid{grid-template-columns:1fr}
}

/* ── CTA BAND ── */
.cta-band{background:var(--g);padding:4rem 1.5rem;text-align:center}
.cta-title{font-family:'DM Serif Display',serif;font-size:clamp(28px,4.5vw,48px);color:var(--dk);margin-bottom:.75rem}
.cta-sub{font-size:15px;color:rgba(17,26,9,.6);margin-bottom:2rem;font-weight:300}

@media (max-width:480px){
  .cta-band{padding:2.5rem 1rem}
  .cta-title{margin-bottom:.5rem}
}

/* ── FOOTER ── */
footer{background:var(--dk);padding:2rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-top:.5px solid rgba(107,143,58,.1);flex-wrap:wrap;gap:1rem}
.foot-brand{font-family:'DM Serif Display',serif;font-size:20px;color:var(--lc)}
.foot-copy{font-size:12px;color:rgba(168,196,106,.25)}
.foot-links{display:flex;gap:1.5rem;flex-wrap:wrap}
.foot-links a{font-size:12px;color:rgba(168,196,106,.25);text-decoration:none;cursor:pointer;min-height:44px;display:flex;align-items:center}

@media (max-width:768px){
  footer{padding:1.5rem 1rem;flex-direction:column;text-align:center;gap:.5rem}
  .foot-links{gap:1rem;justify-content:center}
}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--wh);border-radius:20px;padding:2rem;width:100%;max-width:500px;position:relative;max-height:92vh;overflow-y:auto}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--pp);border:none;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center}
.modal-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:.5rem}
.modal-sub{font-size:13.5px;color:var(--mu);margin-bottom:1.5rem;line-height:1.7}

@media (max-width:480px){
  .modal{padding:1.5rem;max-width:100%;border-radius:16px}
  .modal-title{font-size:20px}
  .modal-close{width:40px;height:40px}
}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--f);color:var(--lc);padding:.875rem 1.5rem;border-radius:14px;font-size:14px;z-index:600;display:none;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-height:44px}
.toast.show{display:flex}

@media (max-width:480px){
  .toast{bottom:1rem;right:1rem;left:1rem;border-radius:12px}
}

/* ── ACCESSIBILITY HELPERS ── */
.a11y-large{font-size:16px!important}
.a11y-xl{font-size:18px!important}
.help-tip{font-size:12px;color:var(--mu);margin-top:4px;display:flex;align-items:center;gap:4px}

/* ── MISC ── */
.divider{height:1px;background:var(--bd);margin:0 1.5rem}
.mt1{margin-top:.875rem}.mt2{margin-top:1.5rem}.mt3{margin-top:2.5rem}
.mb1{margin-bottom:.875rem}.mb2{margin-bottom:1.5rem}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.text-center{text-align:center}
.w-full{width:100%}
.badge-pop{display:inline-block;font-size:10px;background:var(--g);color:var(--lc);padding:3px 10px;border-radius:14px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.feature-card{padding:1.5rem;border:1px solid var(--bd);border-radius:16px;background:var(--wh)}
.feat-icon{font-size:26px;color:var(--g);margin-bottom:.875rem;display:block}
.feat-name{font-size:15px;font-weight:500;margin-bottom:.4rem;color:var(--f)}
.feat-desc{font-size:13px;color:var(--mu);line-height:1.7}
.plot-bar-wrap{height:6px;background:var(--pp);border-radius:3px;overflow:hidden;margin:.4rem 0}
.plot-bar{height:100%;background:var(--g);border-radius:3px}
.check{color:var(--g);font-size:15px}
</style>
</head>
